<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홀덤 정산판</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e0a;
    --bg-card: #131a14;
    --bg-elev: #1a2419;
    --felt: #1d3a2a;
    --gold: #d4af37;
    --gold-soft: #b8941f;
    --red: #c8392c;
    --green: #4a9d5f;
    --text: #e8e4d8;
    --text-dim: #8a8578;
    --border: #2a332a;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(29, 58, 42, 0.3) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    font-size: 14px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  
  header {
    text-align: center;
    padding: 30px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
    position: relative;
  }
  header::before, header::after {
    content: '♠ ♥ ♦ ♣';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    opacity: 0.3;
    font-size: 18px;
    letter-spacing: 4px;
  }
  header::before { left: 0; }
  header::after { right: 0; }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 600;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 6px;
    margin-top: 8px;
    text-transform: uppercase;
  }
  
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .row > * { flex: 1; min-width: 0; }
  
  input, select, button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 3px;
    transition: all 0.2s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold-soft);
    background: var(--bg);
  }
  input[type="number"] { font-variant-numeric: tabular-nums; }
  
  button {
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 12px;
  }
  button:hover { border-color: var(--gold); color: var(--gold); }
  
  .btn-gold {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    font-weight: 700;
  }
  .btn-gold:hover {
    background: var(--gold-soft);
    color: var(--bg);
    border-color: var(--gold-soft);
  }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
    padding: 6px 10px;
    font-size: 11px;
  }
  .btn-danger:hover { background: var(--red); color: var(--text); border-color: var(--red); }
  .btn-small { padding: 6px 12px; font-size: 11px; flex: 0 0 auto; }
  
  /* Player pool */
  .player-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .player-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    transition: all 0.2s;
  }
  .player-chip.selected {
    border-color: var(--gold);
    background: rgba(212, 175, 55, 0.1);
    color: var(--gold);
  }
  .player-chip span { cursor: pointer; }
  .player-chip button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 0 0 0 4px;
    font-size: 14px;
    cursor: pointer;
  }
  .player-chip button:hover { color: var(--red); }
  
  /* Sessions table */
  .session-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .session-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  
  table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }
  th, td {
    padding: 10px 8px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  th:first-child, td:first-child { text-align: left; }
  th {
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1.5px;
  }
  tr:last-child td { border-bottom: none; }
  td input {
    width: 100%;
    text-align: right;
    padding: 6px 8px;
    background: var(--bg);
    font-size: 13px;
  }
  td.profit { color: var(--green); font-weight: 700; }
  td.loss { color: var(--red); font-weight: 700; }
  td.zero { color: var(--text-dim); }
  
  /* Summary */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: var(--bg-elev);
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-align: center;
  }
  .stat-label {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--gold);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  
  .settlement-table th, .settlement-table td { text-align: right; }
  .settlement-table th:first-child, .settlement-table td:first-child { text-align: left; }
  
  .expense-row {
    display: grid;
    grid-template-columns: 1fr 160px auto;
    gap: 10px;
    margin-bottom: 8px;
  }
  
  .empty {
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 20px;
    font-size: 13px;
  }
  
  .toolbar {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  
  .date-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .date-row label {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  
  .checkbox-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .checkbox-list label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .checkbox-list label:hover { border-color: var(--gold-soft); }
  .checkbox-list input { display: none; }
  .checkbox-list input:checked + span { color: var(--gold); }
  .checkbox-list label:has(input:checked) {
    border-color: var(--gold);
    background: rgba(212, 175, 55, 0.1);
  }
  
  @media (max-width: 640px) {
    h1 { font-size: 28px; letter-spacing: 4px; }
    header::before, header::after { display: none; }
    .section { padding: 16px; }
    .expense-row { grid-template-columns: 1fr 120px auto; }
    th, td { padding: 8px 4px; font-size: 12px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>HOLDEM LEDGER</h1>
  <div class="subtitle">Night Settlement Board</div>
</header>

<!-- Date & Players -->
<div class="section">
  <div class="section-title">Setup</div>
  <div class="date-row" style="margin-bottom: 20px;">
    <label>날짜</label>
    <input type="date" id="game-date" style="max-width: 200px;">
  </div>
  
  <div style="color: var(--text-dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;">전체 플레이어 풀</div>
  <div class="row" style="margin-bottom: 6px;">
    <input type="text" id="new-player-name" placeholder="새 플레이어 이름" style="flex: 1;">
    <button class="btn-gold btn-small" onclick="addPlayer()">+ 추가</button>
  </div>
  <div class="player-pool" id="player-pool"></div>
  
  <div style="color: var(--text-dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0 8px;">오늘 참가자 선택</div>
  <div class="checkbox-list" id="participant-list"></div>
</div>

<!-- Sessions -->
<div class="section">
  <div class="section-title">Sessions</div>
  <div id="sessions-container"></div>
  <div style="text-align: center; margin-top: 14px;">
    <button class="btn-gold" onclick="addSession()">+ 세션 추가</button>
  </div>
</div>

<!-- Expenses -->
<div class="section">
  <div class="section-title">Expenses</div>
  <div style="color: var(--text-dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;">대관료</div>
  <div id="venue-list"></div>
  <div class="expense-row" style="margin-top: 10px;">
    <input type="text" id="venue-name" placeholder="대관 항목 (예: 홀덤펍 A)">
    <input type="number" id="venue-amount" placeholder="금액" min="0">
    <button class="btn-gold btn-small" onclick="addExpense('venue')">추가</button>
  </div>
  
  <div style="color: var(--text-dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0 10px;">식음료비</div>
  <div id="food-list"></div>
  <div class="expense-row" style="margin-top: 10px;">
    <input type="text" id="food-name" placeholder="식음료 항목 (예: 치킨)">
    <input type="number" id="food-amount" placeholder="금액" min="0">
    <button class="btn-gold btn-small" onclick="addExpense('food')">추가</button>
  </div>
</div>

<!-- Summary -->
<div class="section">
  <div class="section-title">Final Settlement</div>
  
  <div class="summary-grid">
    <div class="stat-box">
      <div class="stat-label">총 바인</div>
      <div class="stat-value" id="stat-total-buyin">₩0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">총 비용</div>
      <div class="stat-value" id="stat-total-expense">₩0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">흑자 합계</div>
      <div class="stat-value" id="stat-total-profit">₩0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">참가자 수</div>
      <div class="stat-value" id="stat-player-count">0</div>
    </div>
  </div>
  
  <table class="settlement-table">
    <thead>
      <tr>
        <th>플레이어</th>
        <th>바인 합계</th>
        <th>남은 금액</th>
        <th>순손익</th>
        <th>비용 부담</th>
        <th>최종 정산</th>
      </tr>
    </thead>
    <tbody id="settlement-body"></tbody>
  </table>
  
  <div id="settlement-note" style="margin-top: 16px; padding: 14px; background: var(--bg-elev); border-left: 3px solid var(--gold); font-size: 12px; color: var(--text-dim); line-height: 1.7;"></div>
</div>

<div class="toolbar">
  <button onclick="exportData()">데이터 내보내기</button>
  <button onclick="document.getElementById('import-file').click()">데이터 가져오기</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  <button class="btn-danger" onclick="resetAll()">전체 초기화</button>
</div>

</div>

<script>
// ========== State ==========
let state = {
  date: new Date().toISOString().split('T')[0],
  playerPool: [], // [{id, name}]
  participants: [], // [playerId]
  sessions: [], // [{id, name, entries: {playerId: {buyin, remain}}}]
  venue: [], // [{id, name, amount}]
  food: []   // [{id, name, amount}]
};

const STORAGE_KEY = 'holdem-ledger-v1';

function uid() { return Math.random().toString(36).slice(2, 10); }
function fmt(n) { return '₩' + Math.round(n).toLocaleString('ko-KR'); }

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { state = JSON.parse(raw); } catch(e) {}
  }
  if (!state.sessions || state.sessions.length === 0) {
    state.sessions = [{ id: uid(), name: '세션 1', entries: {} }];
  }
}

// ========== Players ==========
function addPlayer() {
  const input = document.getElementById('new-player-name');
  const name = input.value.trim();
  if (!name) return;
  if (state.playerPool.some(p => p.name === name)) {
    alert('이미 있는 이름이에요');
    return;
  }
  state.playerPool.push({ id: uid(), name });
  input.value = '';
  save(); render();
}

function removePlayer(id) {
  if (!confirm('이 플레이어를 풀에서 삭제할까요? (이번 게임 기록에서도 빠져요)')) return;
  state.playerPool = state.playerPool.filter(p => p.id !== id);
  state.participants = state.participants.filter(pid => pid !== id);
  state.sessions.forEach(s => { delete s.entries[id]; });
  save(); render();
}

function toggleParticipant(id) {
  if (state.participants.includes(id)) {
    state.participants = state.participants.filter(pid => pid !== id);
    state.sessions.forEach(s => { delete s.entries[id]; });
  } else {
    state.participants.push(id);
    state.sessions.forEach(s => {
      if (!s.entries[id]) s.entries[id] = { buyin: 0, remain: 0 };
    });
  }
  save(); render();
}

// ========== Sessions ==========
function addSession() {
  const newSession = {
    id: uid(),
    name: `세션 ${state.sessions.length + 1}`,
    entries: {}
  };
  state.participants.forEach(pid => {
    newSession.entries[pid] = { buyin: 0, remain: 0 };
  });
  state.sessions.push(newSession);
  save(); render();
}

function removeSession(id) {
  if (state.sessions.length <= 1) {
    alert('최소 1개 세션은 있어야 해요');
    return;
  }
  if (!confirm('이 세션을 삭제할까요?')) return;
  state.sessions = state.sessions.filter(s => s.id !== id);
  save(); render();
}

function renameSession(id, name) {
  const s = state.sessions.find(s => s.id === id);
  if (s) { s.name = name; save(); }
}

function updateEntry(sessionId, playerId, field, value) {
  const s = state.sessions.find(s => s.id === sessionId);
  if (!s) return;
  if (!s.entries[playerId]) s.entries[playerId] = { buyin: 0, remain: 0 };
  s.entries[playerId][field] = parseFloat(value) || 0;
  save(); renderSummary();
}

// ========== Expenses ==========
function addExpense(type) {
  const name = document.getElementById(`${type}-name`).value.trim();
  const amount = parseFloat(document.getElementById(`${type}-amount`).value) || 0;
  if (!name || amount <= 0) {
    alert('항목 이름과 금액을 모두 입력해주세요');
    return;
  }
  state[type].push({ id: uid(), name, amount });
  document.getElementById(`${type}-name`).value = '';
  document.getElementById(`${type}-amount`).value = '';
  save(); render();
}

function removeExpense(type, id) {
  state[type] = state[type].filter(e => e.id !== id);
  save(); render();
}

// ========== Rendering ==========
function getPlayerName(id) {
  const p = state.playerPool.find(p => p.id === id);
  return p ? p.name : '?';
}

function renderPlayerPool() {
  const el = document.getElementById('player-pool');
  if (state.playerPool.length === 0) {
    el.innerHTML = '<div class="empty">아직 등록된 플레이어가 없어요</div>';
    return;
  }
  el.innerHTML = state.playerPool.map(p => `
    <div class="player-chip">
      <span>${escapeHtml(p.name)}</span>
      <button onclick="removePlayer('${p.id}')" title="삭제">×</button>
    </div>
  `).join('');
}

function renderParticipants() {
  const el = document.getElementById('participant-list');
  if (state.playerPool.length === 0) {
    el.innerHTML = '<div class="empty">먼저 플레이어를 풀에 추가해주세요</div>';
    return;
  }
  el.innerHTML = state.playerPool.map(p => `
    <label>
      <input type="checkbox" ${state.participants.includes(p.id) ? 'checked' : ''} 
             onchange="toggleParticipant('${p.id}')">
      <span>${escapeHtml(p.name)}</span>
    </label>
  `).join('');
}

function renderSessions() {
  const el = document.getElementById('sessions-container');
  if (state.participants.length === 0) {
    el.innerHTML = '<div class="empty">참가자를 먼저 선택해주세요</div>';
    return;
  }
  el.innerHTML = state.sessions.map(s => `
    <div class="session-card">
      <div class="session-header">
        <input type="text" value="${escapeHtml(s.name)}" 
               onchange="renameSession('${s.id}', this.value)"
               style="background: transparent; border: none; color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 1px; padding: 4px 0;">
        <button class="btn-danger" onclick="removeSession('${s.id}')">세션 삭제</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>플레이어</th>
            <th>바인</th>
            <th>남은 금액</th>
            <th>손익</th>
          </tr>
        </thead>
        <tbody>
          ${state.participants.map(pid => {
            const entry = s.entries[pid] || { buyin: 0, remain: 0 };
            const pnl = entry.remain - entry.buyin;
            const cls = pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : 'zero';
            return `
              <tr>
                <td>${escapeHtml(getPlayerName(pid))}</td>
                <td><input type="number" value="${entry.buyin}" min="0" step="1000"
                     onchange="updateEntry('${s.id}', '${pid}', 'buyin', this.value)"></td>
                <td><input type="number" value="${entry.remain}" min="0" step="1000"
                     onchange="updateEntry('${s.id}', '${pid}', 'remain', this.value)"></td>
                <td class="${cls}">${pnl > 0 ? '+' : ''}${fmt(pnl)}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `).join('');
}

function renderExpenses() {
  ['venue', 'food'].forEach(type => {
    const el = document.getElementById(`${type}-list`);
    if (state[type].length === 0) {
      el.innerHTML = '<div class="empty" style="padding: 10px;">아직 항목이 없어요</div>';
      return;
    }
    el.innerHTML = state[type].map(e => `
      <div class="expense-row" style="margin-bottom: 6px;">
        <div style="display: flex; align-items: center; padding: 0 4px;">${escapeHtml(e.name)}</div>
        <div style="text-align: right; padding: 8px; color: var(--gold); font-variant-numeric: tabular-nums;">${fmt(e.amount)}</div>
        <button class="btn-danger" onclick="removeExpense('${type}', '${e.id}')">×</button>
      </div>
    `).join('');
  });
}

function renderSummary() {
  // Calculate player totals
  const playerStats = {};
  state.participants.forEach(pid => {
    playerStats[pid] = { buyin: 0, remain: 0, pnl: 0 };
  });
  state.sessions.forEach(s => {
    state.participants.forEach(pid => {
      const e = s.entries[pid] || { buyin: 0, remain: 0 };
      playerStats[pid].buyin += e.buyin;
      playerStats[pid].remain += e.remain;
    });
  });
  state.participants.forEach(pid => {
    playerStats[pid].pnl = playerStats[pid].remain - playerStats[pid].buyin;
  });
  
  const totalBuyin = Object.values(playerStats).reduce((s, p) => s + p.buyin, 0);
  const venueTotal = state.venue.reduce((s, e) => s + e.amount, 0);
  const foodTotal = state.food.reduce((s, e) => s + e.amount, 0);
  const totalExpense = venueTotal + foodTotal;
  
  // Profit pool (only positive PnL players share expenses)
  const profitPlayers = state.participants.filter(pid => playerStats[pid].pnl > 0);
  const totalProfit = profitPlayers.reduce((s, pid) => s + playerStats[pid].pnl, 0);
  
  // Allocate expenses by profit ratio
  const expenseShare = {};
  state.participants.forEach(pid => { expenseShare[pid] = 0; });
  if (totalProfit > 0) {
    profitPlayers.forEach(pid => {
      expenseShare[pid] = totalExpense * (playerStats[pid].pnl / totalProfit);
    });
  }
  
  // Update stats
  document.getElementById('stat-total-buyin').textContent = fmt(totalBuyin);
  document.getElementById('stat-total-expense').textContent = fmt(totalExpense);
  document.getElementById('stat-total-profit').textContent = fmt(totalProfit);
  document.getElementById('stat-player-count').textContent = state.participants.length;
  
  // Settlement table
  const tbody = document.getElementById('settlement-body');
  if (state.participants.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">참가자가 없어요</td></tr>';
  } else {
    tbody.innerHTML = state.participants.map(pid => {
      const s = playerStats[pid];
      const share = expenseShare[pid];
      const final = s.pnl - share;
      const cls = final > 0 ? 'profit' : final < 0 ? 'loss' : 'zero';
      const pnlCls = s.pnl > 0 ? 'profit' : s.pnl < 0 ? 'loss' : 'zero';
      return `
        <tr>
          <td>${escapeHtml(getPlayerName(pid))}</td>
          <td>${fmt(s.buyin)}</td>
          <td>${fmt(s.remain)}</td>
          <td class="${pnlCls}">${s.pnl > 0 ? '+' : ''}${fmt(s.pnl)}</td>
          <td>${share > 0 ? '−' + fmt(share) : '—'}</td>
          <td class="${cls}">${final > 0 ? '+' : ''}${fmt(final)}</td>
        </tr>
      `;
    }).join('');
  }
  
  // Note
  const note = document.getElementById('settlement-note');
  if (totalExpense > 0 && totalProfit > 0) {
    const detail = profitPlayers.map(pid => {
      const ratio = (playerStats[pid].pnl / totalProfit * 100).toFixed(1);
      return `${getPlayerName(pid)}: ${ratio}% (${fmt(expenseShare[pid])})`;
    }).join(' · ');
    note.innerHTML = `<strong style="color: var(--gold);">비용 분담 방식</strong><br>총 비용 ${fmt(totalExpense)}원을 흑자 플레이어들이 흑자 비율대로 부담합니다.<br>${detail}`;
  } else if (totalExpense > 0) {
    note.innerHTML = `<strong style="color: var(--gold);">알림</strong> · 흑자 플레이어가 없어 비용 분담이 계산되지 않았어요. 모두 적자면 별도 협의가 필요해요.`;
  } else {
    note.innerHTML = `대관료/식음료비를 입력하면 흑자 플레이어들의 비용 분담이 자동 계산돼요.`;
  }
}

function render() {
  document.getElementById('game-date').value = state.date;
  renderPlayerPool();
  renderParticipants();
  renderSessions();
  renderExpenses();
  renderSummary();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ========== Import/Export ==========
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `holdem-${state.date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.playerPool || !data.sessions) throw new Error('형식 오류');
      state = data;
      save(); render();
      alert('불러왔어요!');
    } catch(err) {
      alert('파일을 읽을 수 없어요: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAll() {
  if (!confirm('정말 모든 데이터를 초기화할까요? 이 동작은 되돌릴 수 없어요.')) return;
  if (!confirm('마지막 확인이에요. 진짜 초기화할까요?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {
    date: new Date().toISOString().split('T')[0],
    playerPool: [],
    participants: [],
    sessions: [{ id: uid(), name: '세션 1', entries: {} }],
    venue: [],
    food: []
  };
  save(); render();
}

// ========== Init ==========
document.getElementById('game-date').addEventListener('change', e => {
  state.date = e.target.value;
  save();
});

document.getElementById('new-player-name').addEventListener('keypress', e => {
  if (e.key === 'Enter') addPlayer();
});

load();
render();
</script>
