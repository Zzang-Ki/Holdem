<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홀덤 정산판</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e0a;
    --bg-card: #131a14;
    --bg-elev: #1a2419;
    --felt: #1d3a2a;
    --gold: #d4af37;
    --gold-soft: #b8941f;
    --red: #c8392c;
    --green: #4a9d5f;
    --text: #e8e4d8;
    --text-dim: #8a8578;
    --border: #2a332a;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(29, 58, 42, 0.3) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    padding: 30px 20px 20px;
    font-size: 14px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  
  header {
    text-align: center;
    padding: 30px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
    position: relative;
  }
  header::before, header::after {
    content: '♠ ♥ ♦ ♣';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    opacity: 0.3;
    font-size: 18px;
    letter-spacing: 4px;
  }
  header::before { left: 0; }
  header::after { right: 0; }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 600;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 6px;
    margin-top: 8px;
    text-transform: uppercase;
  }
  
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .row > * { flex: 1; min-width: 0; }
  
  input, select, button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 3px;
    transition: all 0.2s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold-soft);
    background: var(--bg);
  }
  input[type="number"] { font-variant-numeric: tabular-nums; }
  
  button {
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 12px;
  }
  button:hover { border-color: var(--gold); color: var(--gold); }
  
  .btn-gold {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    font-weight: 700;
  }
  .btn-gold:hover {
    background: var(--gold-soft);
    color: var(--bg);
    border-color: var(--gold-soft);
  }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
    padding: 6px 10px;
    font-size: 11px;
  }
  .btn-danger:hover { background: var(--red); color: var(--text); border-color: var(--red); }
  .btn-small { padding: 6px 12px; font-size: 11px; flex: 0 0 auto; }
  
  /* Player pool */
  .player-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .player-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    transition: all 0.2s;
  }
  .player-chip.selected {
    border-color: var(--gold);
    background: rgba(212, 175, 55, 0.1);
    color: var(--gold);
  }
  .player-chip span { cursor: pointer; }
  .player-chip button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 0 0 0 4px;
    font-size: 14px;
    cursor: pointer;
  }
  .player-chip button:hover { color: var(--red); }
  
  /* Sessions table */
  .session-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .session-card.invalid {
    border-color: var(--red);
    box-shadow: 0 0 0 1px rgba(200, 57, 44, 0.3);
  }
  .session-warning {
    color: var(--red);
    font-size: 11px;
    margin-left: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .session-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  
  table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }
  th, td {
    padding: 10px 8px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  th:first-child, td:first-child { text-align: left; }
  th {
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1.5px;
  }
  tr:last-child td { border-bottom: none; }
  td input {
    width: 100%;
    text-align: right;
    padding: 6px 8px;
    background: var(--bg);
    font-size: 13px;
  }
  td.profit { color: var(--green); font-weight: 700; }
  td.loss { color: var(--red); font-weight: 700; }
  td.zero { color: var(--text-dim); }
  
  /* Summary */
  .settlement-table th, .settlement-table td { text-align: right; }
  .settlement-table th:first-child, .settlement-table td:first-child { text-align: left; }
  
  .settlement-date {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .settlement-date:empty { display: none; }
  
  .expense-row {
    display: grid;
    grid-template-columns: 1fr 140px 140px auto;
    gap: 10px;
    margin-bottom: 8px;
  }
  .expense-row.no-payer {
    grid-template-columns: 1fr 140px auto;
  }
  
  .expense-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--gold-soft);
    border-radius: 4px;
  }
  .expense-total-label {
    color: var(--text);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .expense-total-value {
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  
  .empty {
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 20px;
    font-size: 13px;
  }
  
  .toolbar {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  
  .date-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .date-row label {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  
  @media (max-width: 640px) {
    .section { padding: 16px; }
    .expense-row { grid-template-columns: 1fr 100px 100px auto; gap: 6px; }
    .expense-row.no-payer { grid-template-columns: 1fr 120px auto; }
    th, td { padding: 8px 4px; font-size: 12px; }
    .expense-total-value { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="container">

<!-- Date -->
<div class="section">
  <div class="section-title">날짜</div>
  <input type="date" id="game-date" style="max-width: 220px;">
</div>

<!-- Players -->
<div class="section">
  <div class="section-title">플레이어</div>
  <div class="row" style="margin-bottom: 12px;">
    <input type="text" id="new-player-name" placeholder="플레이어 이름 입력" style="flex: 1;" list="player-history">
    <datalist id="player-history"></datalist>
    <button class="btn-gold btn-small" onclick="addPlayer()">+ 추가</button>
  </div>
  <div class="player-pool" id="participants-display"></div>
</div>

<!-- Sessions -->
<div class="section">
  <div class="section-title">세션</div>
  <div id="sessions-container"></div>
  <div style="text-align: center; margin-top: 14px;">
    <button class="btn-gold" onclick="addSession()">+ 세션 추가</button>
  </div>
</div>

<!-- Expenses -->
<div class="section">
  <div class="section-title">비용</div>
  <div id="expense-list"></div>
  <div class="expense-row" style="margin-top: 10px;">
    <input type="text" id="expense-name" placeholder="항목 (예: 대관료, 피자)">
    <select id="expense-payer">
      <option value="">결제자 선택</option>
    </select>
    <input type="number" id="expense-amount" placeholder="금액" min="0">
    <button class="btn-gold btn-small" onclick="addExpense()">추가</button>
  </div>
  <div class="expense-total" id="expense-total-row">
    <span class="expense-total-label">총 비용</span>
    <span class="expense-total-value" id="expense-total-value">₩0</span>
  </div>
</div>

<!-- Summary -->
<div class="section" id="settlement-section">
  <div class="section-title">최종 정산</div>
  
  <div class="settlement-date" id="settlement-date-display"></div>
  
  <table class="settlement-table">
    <thead>
      <tr>
        <th>플레이어</th>
        <th>바인 합계</th>
        <th>남은 금액</th>
        <th>실제 손익</th>
        <th>비용 부담</th>
        <th>결제 환급</th>
        <th>최종 정산</th>
      </tr>
    </thead>
    <tbody id="settlement-body"></tbody>
  </table>
  
  <div id="settlement-note" style="margin-top: 16px; padding: 14px; background: var(--bg-elev); border-left: 3px solid var(--gold); font-size: 12px; color: var(--text-dim); line-height: 1.7;"></div>
</div>

<div class="toolbar">
  <button class="btn-gold" onclick="shareImage()">📤 공유하기</button>
  <button onclick="exportData()">기록 저장하기</button>
  <button onclick="document.getElementById('import-file').click()">기록 불러오기</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  <button class="btn-danger" onclick="resetAll()">전체 초기화</button>
</div>

</div>

<script>
// ========== State ==========
let state = {
  date: new Date().toISOString().split('T')[0],
  participants: [], // [{id, name}] - 오늘 참가자 (id는 세션 entries 키로 사용)
  playerHistory: [], // [name] - 자동완성용 이전 사용 이름들
  sessions: [], // [{id, name, entries: {playerId: {buyin, remain}}}]
  expenses: []  // [{id, name, amount}] - 비용 통합 (대관료, 식음료비 등)
};

const STORAGE_KEY = 'holdem-ledger-v1';

function uid() { return Math.random().toString(36).slice(2, 10); }
function fmt(n) { return '₩' + Math.round(n).toLocaleString('ko-KR'); }

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { 
      const loaded = JSON.parse(raw);
      // 구버전 데이터 마이그레이션 (playerPool + participants[id] → participants[{id,name}])
      if (loaded.playerPool && Array.isArray(loaded.participants) && typeof loaded.participants[0] === 'string') {
        const newParticipants = loaded.participants
          .map(pid => loaded.playerPool.find(p => p.id === pid))
          .filter(Boolean);
        loaded.playerHistory = loaded.playerPool.map(p => p.name);
        loaded.participants = newParticipants;
        delete loaded.playerPool;
      }
      if (!loaded.playerHistory) loaded.playerHistory = [];
      // venue/food → expenses 마이그레이션
      if (!loaded.expenses) {
        loaded.expenses = [];
        if (Array.isArray(loaded.venue)) loaded.expenses.push(...loaded.venue);
        if (Array.isArray(loaded.food)) loaded.expenses.push(...loaded.food);
        delete loaded.venue;
        delete loaded.food;
      }
      state = loaded;
    } catch(e) {}
  }
  if (!state.sessions || state.sessions.length === 0) {
    state.sessions = [{ id: uid(), name: '세션 1', entries: {} }];
  }
}

// ========== Players ==========
function addPlayer() {
  const input = document.getElementById('new-player-name');
  const name = input.value.trim();
  if (!name) return;
  if (state.participants.some(p => p.name === name)) {
    alert('이미 추가된 플레이어예요');
    return;
  }
  const newPlayer = { id: uid(), name };
  state.participants.push(newPlayer);
  // 히스토리에 저장 (자동완성용, 최대 30개)
  if (!state.playerHistory.includes(name)) {
    state.playerHistory.unshift(name);
    if (state.playerHistory.length > 30) state.playerHistory.pop();
  }
  // 모든 세션에 빈 엔트리 추가
  state.sessions.forEach(s => {
    if (!s.entries[newPlayer.id]) s.entries[newPlayer.id] = { buyin: 0, remain: 0 };
  });
  input.value = '';
  save(); render();
}

function removePlayer(id) {
  if (!confirm('이 플레이어를 오늘 참가자에서 제외할까요?')) return;
  state.participants = state.participants.filter(p => p.id !== id);
  state.sessions.forEach(s => { delete s.entries[id]; });
  save(); render();
}

function removeFromHistory(name) {
  state.playerHistory = state.playerHistory.filter(n => n !== name);
  save(); render();
}

// ========== Sessions ==========
function addSession() {
  const newSession = {
    id: uid(),
    name: `세션 ${state.sessions.length + 1}`,
    entries: {}
  };
  state.participants.forEach(p => {
    newSession.entries[p.id] = { buyin: 0, remain: 0 };
  });
  state.sessions.push(newSession);
  save(); render();
}

function removeSession(id) {
  // 첫 번째 세션(세션 1)은 삭제 불가
  const index = state.sessions.findIndex(s => s.id === id);
  if (index === 0) {
    alert('세션 1은 삭제할 수 없어요');
    return;
  }
  if (!confirm('이 세션을 삭제할까요?')) return;
  state.sessions = state.sessions.filter(s => s.id !== id);
  save(); render();
}

function renameSession(id, name) {
  const s = state.sessions.find(s => s.id === id);
  if (s) { s.name = name; save(); }
}

function updateEntry(sessionId, playerId, field, value) {
  const s = state.sessions.find(s => s.id === sessionId);
  if (!s) return;
  if (!s.entries[playerId]) s.entries[playerId] = { buyin: 0, remain: 0 };
  s.entries[playerId][field] = parseFloat(value) || 0;
  save(); renderSummary();
}

// ========== Expenses ==========
function addExpense() {
  const name = document.getElementById('expense-name').value.trim();
  const amount = parseFloat(document.getElementById('expense-amount').value) || 0;
  const payerId = document.getElementById('expense-payer').value || null;
  if (!name || amount <= 0) {
    alert('항목 이름과 금액을 모두 입력해주세요');
    return;
  }
  state.expenses.push({ id: uid(), name, amount, payerId });
  document.getElementById('expense-name').value = '';
  document.getElementById('expense-amount').value = '';
  document.getElementById('expense-payer').value = '';
  save(); render();
}

function removeExpense(id) {
  state.expenses = state.expenses.filter(e => e.id !== id);
  save(); render();
}

function updateExpensePayer(id, payerId) {
  const exp = state.expenses.find(e => e.id === id);
  if (exp) {
    exp.payerId = payerId || null;
    save(); render();
  }
}

// ========== Rendering ==========
function getPlayerName(id) {
  const p = state.participants.find(p => p.id === id);
  return p ? p.name : '?';
}

function renderParticipantsDisplay() {
  const el = document.getElementById('participants-display');
  if (state.participants.length === 0) {
    el.innerHTML = '<div class="empty">아직 참가자가 없어요. 위에서 이름을 입력하고 추가해주세요</div>';
    return;
  }
  el.innerHTML = state.participants.map(p => `
    <div class="player-chip selected">
      <span>${escapeHtml(p.name)}</span>
      <button onclick="removePlayer('${p.id}')" title="제외">×</button>
    </div>
  `).join('');
}

function renderPlayerHistory() {
  const datalist = document.getElementById('player-history');
  // 이미 추가된 참가자는 자동완성에서 제외
  const availableNames = state.playerHistory.filter(n => 
    !state.participants.some(p => p.name === n)
  );
  datalist.innerHTML = availableNames.map(name => 
    `<option value="${escapeHtml(name)}">`
  ).join('');
}

function renderSessions() {
  const el = document.getElementById('sessions-container');
  el.innerHTML = state.sessions.map((s, index) => {
    const isFirst = index === 0;
    const hasParticipants = state.participants.length > 0;
    
    // 세션 검증: 총 바인 = 총 남은 금액
    let totalBuyin = 0, totalRemain = 0;
    state.participants.forEach(p => {
      const entry = s.entries[p.id] || { buyin: 0, remain: 0 };
      totalBuyin += entry.buyin;
      totalRemain += entry.remain;
    });
    const isValid = totalBuyin === totalRemain;
    const hasAnyValue = totalBuyin > 0 || totalRemain > 0;
    const showWarning = hasParticipants && hasAnyValue && !isValid;
    
    return `
    <div class="session-card${showWarning ? ' invalid' : ''}">
      <div class="session-header">
        <div style="display: flex; align-items: center; flex: 1; flex-wrap: wrap;">
          <input type="text" value="${escapeHtml(s.name)}" 
                 onchange="renameSession('${s.id}', this.value)"
                 style="background: transparent; border: none; color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 1px; padding: 4px 0;">
          ${showWarning ? `<span class="session-warning">* 바인 금액과 남은 금액이 다릅니다.</span>` : ''}
        </div>
        ${isFirst ? '' : `<button class="btn-danger" onclick="removeSession('${s.id}')">세션 삭제</button>`}
      </div>
      <table>
        <thead>
          <tr>
            <th>플레이어</th>
            <th>바인 금액</th>
            <th>남은 금액</th>
            <th>손익</th>
            <th>실제 손익 (50%)</th>
          </tr>
        </thead>
        <tbody>
          ${hasParticipants ? state.participants.map(p => {
            const entry = s.entries[p.id] || { buyin: 0, remain: 0 };
            const pnl = entry.remain - entry.buyin;
            const actualPnl = pnl * 0.5;
            const cls = pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : 'zero';
            const actualCls = actualPnl > 0 ? 'profit' : actualPnl < 0 ? 'loss' : 'zero';
            return `
              <tr>
                <td>${escapeHtml(p.name)}</td>
                <td><input type="number" value="${entry.buyin}" min="0" step="1000"
                     onchange="updateEntry('${s.id}', '${p.id}', 'buyin', this.value)"></td>
                <td><input type="number" value="${entry.remain}" min="0" step="1000"
                     onchange="updateEntry('${s.id}', '${p.id}', 'remain', this.value)"></td>
                <td class="${cls}">${pnl > 0 ? '+' : ''}${fmt(pnl)}</td>
                <td class="${actualCls}">${actualPnl > 0 ? '+' : ''}${fmt(actualPnl)}</td>
              </tr>
            `;
          }).join('') : `
            <tr>
              <td colspan="5" class="empty" style="padding: 16px;">참가자를 추가하면 입력란이 표시돼요</td>
            </tr>
          `}
        </tbody>
      </table>
    </div>
  `;
  }).join('');
}

function renderExpenses() {
  // 입력 영역 결제자 드롭다운 옵션 채우기
  const payerSelect = document.getElementById('expense-payer');
  const currentSelected = payerSelect.value;
  payerSelect.innerHTML = '<option value="">결제자 선택</option>' +
    state.participants.map(p => 
      `<option value="${p.id}">${escapeHtml(p.name)}</option>`
    ).join('');
  payerSelect.value = currentSelected;
  
  const el = document.getElementById('expense-list');
  if (state.expenses.length === 0) {
    el.innerHTML = '<div class="empty" style="padding: 10px;">아직 항목이 없어요</div>';
  } else {
    el.innerHTML = state.expenses.map(e => {
      // 각 비용 항목의 결제자 드롭다운
      const payerOptions = '<option value="">결제자 없음</option>' +
        state.participants.map(p => 
          `<option value="${p.id}" ${e.payerId === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`
        ).join('');
      return `
        <div class="expense-row" style="margin-bottom: 6px;">
          <div style="display: flex; align-items: center; padding: 0 4px;">${escapeHtml(e.name)}</div>
          <select onchange="updateExpensePayer('${e.id}', this.value)" style="font-size: 12px;">${payerOptions}</select>
          <div style="text-align: right; padding: 8px; color: var(--gold); font-variant-numeric: tabular-nums;">${fmt(e.amount)}</div>
          <button class="btn-danger" onclick="removeExpense('${e.id}')">×</button>
        </div>
      `;
    }).join('');
  }
  // 총 비용 표시
  const total = state.expenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById('expense-total-value').textContent = fmt(total);
}

function renderSummary() {
  // 플레이어별 누적 (모든 세션 합산)
  const playerStats = {};
  state.participants.forEach(p => {
    playerStats[p.id] = { buyin: 0, remain: 0, pnl: 0, actualPnl: 0 };
  });
  state.sessions.forEach(s => {
    state.participants.forEach(p => {
      const e = s.entries[p.id] || { buyin: 0, remain: 0 };
      playerStats[p.id].buyin += e.buyin;
      playerStats[p.id].remain += e.remain;
    });
  });
  state.participants.forEach(p => {
    playerStats[p.id].pnl = playerStats[p.id].remain - playerStats[p.id].buyin;
    // 실제 손익은 50% 적용
    playerStats[p.id].actualPnl = playerStats[p.id].pnl * 0.5;
  });
  
  const totalExpense = state.expenses.reduce((s, e) => s + e.amount, 0);
  
  // 결제자별 환급액 계산
  const paymentRefund = {};
  state.participants.forEach(p => { paymentRefund[p.id] = 0; });
  state.expenses.forEach(e => {
    if (e.payerId && paymentRefund[e.payerId] !== undefined) {
      paymentRefund[e.payerId] += e.amount;
    }
  });
  
  // 흑자 플레이어 풀 (실제 손익 기준)
  const profitPlayers = state.participants.filter(p => playerStats[p.id].actualPnl > 0);
  const totalProfit = profitPlayers.reduce((s, p) => s + playerStats[p.id].actualPnl, 0);
  
  // 비용 분담 (실제 손익 비율, 1000원 단위 반올림)
  const expenseShare = {};
  state.participants.forEach(p => { expenseShare[p.id] = 0; });
  if (totalProfit > 0) {
    profitPlayers.forEach(p => {
      const raw = totalExpense * (playerStats[p.id].actualPnl / totalProfit);
      expenseShare[p.id] = Math.round(raw / 1000) * 1000;
    });
  }
  
  // 정산 테이블
  const tbody = document.getElementById('settlement-body');
  if (state.participants.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">참가자가 없어요</td></tr>';
  } else {
    tbody.innerHTML = state.participants.map(p => {
      const s = playerStats[p.id];
      const share = expenseShare[p.id];
      const refund = paymentRefund[p.id];
      const final = s.actualPnl - share + refund;
      const cls = final > 0 ? 'profit' : final < 0 ? 'loss' : 'zero';
      const pnlCls = s.actualPnl > 0 ? 'profit' : s.actualPnl < 0 ? 'loss' : 'zero';
      return `
        <tr>
          <td>${escapeHtml(p.name)}</td>
          <td>${fmt(s.buyin)}</td>
          <td>${fmt(s.remain)}</td>
          <td class="${pnlCls}">${s.actualPnl > 0 ? '+' : ''}${fmt(s.actualPnl)}</td>
          <td>${share > 0 ? '−' + fmt(share) : '—'}</td>
          <td>${refund > 0 ? '+' + fmt(refund) : '—'}</td>
          <td class="${cls}">${final > 0 ? '+' : ''}${fmt(final)}</td>
        </tr>
      `;
    }).join('');
  }
  
  // 분담 방식 안내
  const note = document.getElementById('settlement-note');
  const totalRefund = Object.values(paymentRefund).reduce((s, v) => s + v, 0);
  const unpaidExpense = totalExpense - totalRefund;
  
  let noteHtml = '';
  if (totalExpense > 0 && totalProfit > 0) {
    const detail = profitPlayers.map(p => {
      const ratio = (playerStats[p.id].actualPnl / totalProfit * 100).toFixed(1);
      return `${p.name}: ${ratio}% (${fmt(expenseShare[p.id])})`;
    }).join(' · ');
    noteHtml = `<strong style="color: var(--gold);">비용 분담 방식</strong><br>총 비용 ${fmt(totalExpense)}원을 흑자 플레이어들이 흑자 비율대로 천 원 단위에서 반올림하여 부담합니다.<br>${detail}`;
    
    // 결제자 환급 안내
    const refunders = state.participants.filter(p => paymentRefund[p.id] > 0);
    if (refunders.length > 0) {
      const refundDetail = refunders.map(p => `${p.name}: +${fmt(paymentRefund[p.id])}`).join(' · ');
      noteHtml += `<br><br><strong style="color: var(--gold);">결제 환급</strong><br>${refundDetail}`;
    }
    if (unpaidExpense > 0) {
      noteHtml += `<br><br><span style="color: var(--red);">⚠ 결제자 미지정 비용: ${fmt(unpaidExpense)}원</span>`;
    }
  } else if (totalExpense > 0) {
    noteHtml = `<strong style="color: var(--gold);">알림</strong> · 흑자 플레이어가 없어 비용 분담이 계산되지 않았어요. 모두 적자면 별도 협의가 필요해요.`;
  } else {
    noteHtml = `비용을 입력하면 흑자 플레이어들의 비용 분담이 자동 계산돼요.`;
  }
  note.innerHTML = noteHtml;
}

function render() {
  document.getElementById('game-date').value = state.date;
  // 정산 섹션 상단 날짜 표시
  const dateDisplay = document.getElementById('settlement-date-display');
  if (state.date) {
    const d = new Date(state.date);
    const formatted = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    dateDisplay.textContent = `▸ ${formatted}`;
  } else {
    dateDisplay.textContent = '';
  }
  renderParticipantsDisplay();
  renderPlayerHistory();
  renderSessions();
  renderExpenses();
  renderSummary();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ========== Image Share ==========
async function shareImage() {
  if (state.participants.length === 0) {
    alert('참가자가 없어요. 정산할 내용이 없습니다.');
    return;
  }
  
  const section = document.getElementById('settlement-section');
  const btn = event.target;
  const originalText = btn.textContent;
  btn.textContent = '⏳ 생성 중...';
  btn.disabled = true;
  
  // 데스크탑 너비로 강제 캡쳐를 위한 임시 스타일 적용
  const DESKTOP_WIDTH = 1060; // 컨테이너 max-width 1100 - padding 고려
  const originalCssText = section.style.cssText;
  const originalBodyOverflow = document.body.style.overflow;
  
  // 캡쳐용 임시 스타일
  section.style.width = DESKTOP_WIDTH + 'px';
  section.style.maxWidth = 'none';
  section.style.position = 'fixed';
  section.style.left = '-9999px';
  section.style.top = '0';
  section.style.zIndex = '-1';
  document.body.style.overflow = 'hidden';
  
  try {
    // DOM 렌더링 반영 대기
    await new Promise(resolve => setTimeout(resolve, 50));
    
    // 1. 정산 섹션을 캔버스로 캡쳐 (데스크탑 너비)
    const canvas = await html2canvas(section, {
      backgroundColor: '#0a0e0a',
      scale: 2,
      width: DESKTOP_WIDTH,
      windowWidth: DESKTOP_WIDTH,
      logging: false,
      useCORS: true
    });
    
    // 원래 스타일 복원
    section.style.cssText = originalCssText;
    document.body.style.overflow = originalBodyOverflow;
    
    // 2. Blob 생성
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const filename = `홀덤정산_${state.date || 'untitled'}.png`;
    const file = new File([blob], filename, { type: 'image/png' });
    
    // 3. Web Share API 시도 (모바일에서 OS 공유 시트 → 카톡 선택 가능)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: '홀덤 정산 결과',
          text: `홀덤 정산 결과 (${state.date || ''})`
        });
        return;
      } catch (err) {
        if (err.name === 'AbortError') return;
        console.warn('Share API 실패, 다운로드로 전환:', err);
      }
    }
    
    // 4. Fallback: 다운로드
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    
    if (!navigator.canShare) {
      setTimeout(() => {
        alert('이미지가 다운로드 되었어요!\n카톡 채팅창에 끌어다 놓으시면 공유 가능합니다.');
      }, 300);
    }
  } catch(err) {
    // 에러 발생 시에도 스타일 복원
    section.style.cssText = originalCssText;
    document.body.style.overflow = originalBodyOverflow;
    alert('이미지 생성 실패: ' + err.message);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

// ========== Import/Export ==========
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `holdem-${state.date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions) throw new Error('형식 오류');
      // 구버전 호환 마이그레이션
      if (data.playerPool && Array.isArray(data.participants) && typeof data.participants[0] === 'string') {
        const newParticipants = data.participants
          .map(pid => data.playerPool.find(p => p.id === pid))
          .filter(Boolean);
        data.playerHistory = data.playerPool.map(p => p.name);
        data.participants = newParticipants;
        delete data.playerPool;
      }
      if (!data.participants) data.participants = [];
      if (!data.playerHistory) data.playerHistory = [];
      // venue/food → expenses 마이그레이션
      if (!data.expenses) {
        data.expenses = [];
        if (Array.isArray(data.venue)) data.expenses.push(...data.venue);
        if (Array.isArray(data.food)) data.expenses.push(...data.food);
        delete data.venue;
        delete data.food;
      }
      state = data;
      save(); render();
      alert('불러왔어요!');
    } catch(err) {
      alert('파일을 읽을 수 없어요: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAll() {
  if (!confirm('정말 모든 데이터를 초기화할까요? 이 동작은 되돌릴 수 없어요.')) return;
  if (!confirm('마지막 확인이에요. 진짜 초기화할까요? (자동완성 이름 기록도 함께 삭제됩니다)')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {
    date: new Date().toISOString().split('T')[0],
    participants: [],
    playerHistory: [],
    sessions: [{ id: uid(), name: '세션 1', entries: {} }],
    expenses: []
  };
  save(); render();
}

// ========== Init ==========
document.getElementById('game-date').addEventListener('change', e => {
  state.date = e.target.value;
  save();
});

document.getElementById('new-player-name').addEventListener('keypress', e => {
  if (e.key === 'Enter') addPlayer();
});

load();
render();
</script>
