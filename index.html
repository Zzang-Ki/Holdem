<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#EAF1FC">
<title>Holdem Mates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f6fa;
    --bg-card: #ffffff;
    --bg-elev: #eef2f9;
    --felt: #1f6b4a;
    --gold: #2563c9;
    --gold-soft: #4f86e0;
    --red: #d63a4a;
    --green: #14a06a;
    --share: #16c75a;
    --share-dark: #11a84a;
    --text: #1e2433;
    --text-dim: #8089a0;
    --border: #d4dcea;
  }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 5%, rgba(37, 99, 201, 0.06) 0%, transparent 35%),
      radial-gradient(circle at 85% 90%, rgba(37, 99, 201, 0.05) 0%, transparent 45%);
    color: var(--text);
    min-height: 100vh;
    padding: 30px 20px 20px;
    font-size: 14px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  
  header {
    text-align: center;
    padding: 30px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
    position: relative;
  }
  header::before, header::after {
    content: '♠ ♥ ♦ ♣';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    opacity: 0.3;
    font-size: 18px;
    letter-spacing: 4px;
  }
  header::before { left: 0; }
  header::after { right: 0; }
  h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 42px;
    font-weight: 600;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 6px;
    margin-top: 8px;
    text-transform: uppercase;
  }
  
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(43, 43, 40, 0.05), 0 1px 3px rgba(43, 43, 40, 0.04);
  }
  .section-title {
    font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 18px;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    width: 7px;
    height: 7px;
    background: var(--gold);
    border-radius: 2px;
    transform: rotate(45deg);
  }
  
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .row > * { flex: 1; min-width: 0; }
  
  input, select, button {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    transition: all 0.2s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold-soft);
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(184, 137, 58, 0.12);
  }
  input[type="number"] { font-variant-numeric: tabular-nums; }
  
  button {
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 12px;
  }
  button:hover { border-color: var(--gold); color: var(--gold); }
  
  .btn-gold {
    background: var(--gold);
    color: #ffffff;
    border-color: var(--gold);
    font-weight: 700;
  }
  .btn-gold:hover {
    background: var(--gold-soft);
    color: #ffffff;
    border-color: var(--gold-soft);
  }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
    padding: 6px 10px;
    font-size: 11px;
  }
  .btn-danger:hover { background: var(--red); color: #ffffff; border-color: var(--red); }
  .btn-small { padding: 6px 12px; font-size: 11px; flex: 0 0 auto; }
  
  /* 바인 금액 스텝퍼 */
  .buyin-stepper {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    justify-content: flex-end;
  }
  .step-btn {
    width: 36px;
    height: 36px;
    padding: 0;
    border-radius: 9px;
    background: var(--gold);
    border: 1px solid var(--gold);
    color: #ffffff;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .step-btn:hover {
    background: var(--gold-soft);
    color: #ffffff;
    border-color: var(--gold-soft);
  }
  .buyin-display {
    min-width: 70px;
    text-align: center;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    font-size: 18px;
  }
  /* 남은 금액 만단위 입력 (입력칸 + '만' 접미사) */
  .remain-input-wrap {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    justify-content: flex-end;
    width: 100%;
  }
  .remain-input-wrap input {
    width: 90px;
    text-align: right;
  }
  .unit-suffix {
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    flex: 0 0 auto;
  }
  
  /* Player pool */
  .player-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .player-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    box-shadow: 0 1px 3px rgba(30, 36, 51, 0.06);
  }
  .player-chip.selected {
    border-color: var(--gold);
    background: rgba(37, 99, 201, 0.08);
    color: var(--gold);
  }
  .player-chip span { cursor: pointer; }
  .player-chip button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 0 0 0 4px;
    font-size: 14px;
    cursor: pointer;
  }
  .player-chip button:hover { color: var(--red); }
  
  /* Sessions table */
  .session-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .session-card.session-even { background: #eef2f9; }
  .session-card.session-odd { background: #eaf5ee; }
  .session-card.invalid {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
  }
  .session-warning {
    color: var(--red);
    font-size: 11px;
    margin-left: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .session-ok {
    color: var(--green);
    font-size: 11px;
    margin-left: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  /* 세션 접기/펼치기 */
  .collapse-toggle {
    width: 26px;
    height: 26px;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--gold);
    font-size: 11px;
    cursor: pointer;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }
  .collapse-toggle:hover { color: var(--gold-soft); border: none; background: transparent; }
  .session-card.collapsed .session-header {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .session-card.collapsed .session-body { display: none; }
  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--gold-soft);
  }
  .session-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  /* 세션 이름 (수정 불가 라벨) */
  .session-name-label {
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    padding: 4px 0;
  }
  /* 세션 표 셀 폰트 (44px 버튼에 맞춰 확대) */
  .session-card tbody td { font-size: 15px; }
  /* 세션 헤더행: 타이틀(18px)보다 4px 작은 14px + 볼드 + 아래 두줄 구분선 */
  .session-card thead th {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 12px 8px;
    border-bottom: 4px double var(--gold);
  }
  /* 세션 삭제 버튼 - 빨강 배경/흰 글자 (GNB 전체 초기화와 동일) */
  .btn-delete-session {
    background: var(--red);
    color: #ffffff;
    border-color: var(--red);
  }
  .btn-delete-session:hover {
    background: #b92f3e;
    color: #ffffff;
    border-color: #b92f3e;
  }
  /* 세션 헤더 우측 액션 버튼 묶음 */
  .session-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
  }
  .btn-share-session {
    background: var(--share);
    color: #ffffff;
    border-color: var(--share);
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-share-session:hover {
    background: var(--share-dark);
    color: #ffffff;
    border-color: var(--share-dark);
  }
  .btn-share-session:disabled {
    opacity: 0.6;
    cursor: default;
  }
  
  table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }
  th, td {
    padding: 10px 8px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  th:first-child, td:first-child { text-align: left; }
  th {
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1.5px;
  }
  tr:last-child td { border-bottom: none; }
  td input {
    width: 100%;
    text-align: right;
    padding: 11px 10px;
    background: var(--bg);
    font-size: 15px;
  }
  td.profit { color: var(--green); font-weight: 700; }
  td.loss { color: var(--red); font-weight: 700; }
  td.zero { color: var(--text-dim); }
  td.player-name-cell { font-weight: 700; }
  
  /* Summary */
  .settlement-table th, .settlement-table td { text-align: right; }
  .settlement-table th:first-child, .settlement-table td:first-child { text-align: left; }
  .settlement-table thead th { font-size: 16px; font-weight: 700; border-bottom: 4px double var(--gold); }
  .settlement-table tbody tr.settle-even td { background: #f4f7fc; }
  .settlement-table tbody tr.settle-odd td { background: #f1f8f3; }
  .settlement-table tbody td:first-child { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
  .settlement-table tbody td:last-child { border-top-right-radius: 6px; border-bottom-right-radius: 6px; }
  
  /* 최종 정산 한글 단위 보조 표기 */
  .kor-unit {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    opacity: 0.85;
  }
  .kor-unit:empty { display: none; }
  
  .settlement-date {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .settlement-date:empty { display: none; }
  
  /* 비용 입력 카드 (작성 영역) */
  .expense-input-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px;
    margin-top: 12px;
    background: var(--bg-elev);
    border: 1px dashed var(--border);
    border-radius: 10px;
  }
  .expense-input-card .exp-input-name { width: 100%; }
  .expense-input-card .exp-input-half {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .expense-input-card .exp-input-half > * { width: 100%; min-width: 0; }
  .expense-input-card .btn-gold { width: 100%; padding: 11px; }

  /* 비용 항목 (등록된 항목) */
  .expense-item {
    display: grid;
    grid-template-columns: 1.2fr 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .expense-item.exp-even { background: #eef2f9; }
  .expense-item.exp-odd { background: #eaf5ee; }
  .exp-item-name {
    font-weight: 700;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .exp-item-half {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 8px;
  }
  .exp-item-half select { width: 100%; min-width: 0; font-size: 12px; padding: 7px 8px; background: #fff; }
  .exp-item-amount {
    text-align: right;
    color: var(--gold);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .exp-item-del { flex: 0 0 auto; }
  
  .expense-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--gold-soft);
    border-radius: 8px;
  }
  .expense-total-label {
    color: var(--text);
    font-size: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .expense-total-value {
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  
  .empty {
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 20px;
    font-size: 13px;
  }
  
  /* 하단 고정 푸터 */
  .toolbar-fixed {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(30, 36, 51, 0.07);
    padding: 12px 20px;
  }
  .toolbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toolbar-row {
    display: flex;
    gap: 10px;
  }
  .toolbar-row button { flex: 1; padding: 11px; }
  .btn-action {
    background: var(--red);
    color: #ffffff;
    border-color: var(--red);
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-action svg { flex: 0 0 auto; }
  .btn-action:hover {
    background: #b92f3e;
    color: #ffffff;
    border-color: #b92f3e;
  }
  /* 하단 '공유하기' 버튼만 초록 (전체 초기화는 빨강 유지) */
  .btn-action-share {
    background: var(--share);
    border-color: var(--share);
  }
  .btn-action-share:hover {
    background: var(--share-dark);
    border-color: var(--share-dark);
  }
  /* 고정 푸터에 본문이 가리지 않도록 여백 확보 */
  .footer-spacer { height: 130px; }

  /* 전체 초기화 확인 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(30, 36, 51, 0.5);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(30, 36, 51, 0.25);
    animation: modalPop 0.18s ease-out;
  }
  @keyframes modalPop {
    from { transform: scale(0.94); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-title {
    font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 14px;
  }
  .modal-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .modal-desc strong { color: var(--red); }
  .modal-box input {
    width: 100%;
    font-size: 16px;
    padding: 12px 14px;
    margin-bottom: 18px;
    text-align: center;
    border: 2px solid var(--border);
    border-radius: 10px;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
  }
  .modal-actions button {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    border-radius: 10px;
  }
  .modal-confirm {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
    font-weight: 700;
  }
  .modal-confirm:hover {
    background: #b92f3e;
    color: #fff;
    border-color: #b92f3e;
  }
  
  .date-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .date-row label {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  
  /* ===== 모바일 카드형 레이아웃 (768px 이하) ===== */
  @media (max-width: 768px) {
    body { padding: 16px 12px; font-size: 14px; }
    .section { padding: 16px; margin-bottom: 16px; }
    .section-title { font-size: 20px; }

    /* 세션 / 정산 테이블을 카드형으로 전환 */
    .session-card table,
    .settlement-table {
      display: block;
    }
    .session-card thead,
    .settlement-table thead {
      display: none; /* 헤더 숨김 - 각 셀에 data-label로 표시 */
    }
    .session-card tbody,
    .settlement-table tbody {
      display: block;
    }
    .session-card tbody tr,
    .settlement-table tbody tr {
      display: block;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(30, 36, 51, 0.05);
    }
    .session-card tbody tr:last-child,
    .settlement-table tbody tr:last-child {
      margin-bottom: 0;
    }
    /* 모바일 정산 카드 교차 배경 (데스크탑 td 배경은 무효화) */
    .settlement-table tbody tr.settle-even { background: #f4f7fc; }
    .settlement-table tbody tr.settle-odd { background: #f1f8f3; }
    .settlement-table tbody tr.settle-even td,
    .settlement-table tbody tr.settle-odd td { background: transparent; }
    /* 빈 상태 행은 카드 스타일 제외 */
    .session-card tbody tr td.empty,
    .settlement-table tbody tr td.empty {
      display: block;
      text-align: center;
    }
    .session-card tbody tr:has(td.empty),
    .settlement-table tbody tr:has(td.empty) {
      background: transparent;
      border: none;
      padding: 0;
    }

    .session-card tbody td,
    .settlement-table tbody td {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: right;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .session-card tbody td:last-child,
    .settlement-table tbody td:last-child {
      border-bottom: none;
    }
    /* data-label을 좌측 라벨로 표시 */
    .session-card tbody td::before,
    .settlement-table tbody td::before {
      content: attr(data-label);
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: left;
      margin-right: 12px;
      white-space: nowrap;
    }
    /* 플레이어 이름은 카드 상단 헤더처럼 강조 */
    .player-name-cell {
      font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
      font-size: 18px !important;
      font-weight: 700 !important;
      color: var(--gold) !important;
      border-bottom: 1px solid var(--gold-soft) !important;
      padding-bottom: 8px !important;
      margin-bottom: 4px;
    }
    .player-name-cell::before {
      display: none; /* 플레이어 라벨은 숨김 */
    }
    /* 입력칸 모바일 최적화 */
    .session-card tbody td input {
      width: 140px;
      text-align: right;
      font-size: 16px;
      padding: 12px 12px;
    }
    /* 최종 정산 값 강조 */
    .final-cell {
      font-size: 17px !important;
      font-weight: 700;
      padding-top: 10px !important;
      margin-top: 2px;
      border-top: 1px solid var(--border) !important;
    }

    /* 비용 입력/항목 - 모바일 폰트 키우기 */
    .expense-input-card input,
    .expense-input-card select { font-size: 15px; }
    .expense-item {
      grid-template-columns: 1fr auto;
      gap: 8px 10px;
    }
    .exp-item-name { font-size: 16px; grid-column: 1 / -1; }
    .exp-item-half { grid-column: 1; }
    .exp-item-del { grid-column: 2; grid-row: 2; align-self: center; }
    .exp-item-amount { font-size: 15px; }
    .exp-item-half select { font-size: 13px; }

    /* 세션 헤더 */
    .session-header { flex-wrap: wrap; gap: 8px; }
    .session-warning, .session-ok { margin-left: 0; display: block; width: 100%; }

    /* 플레이어 칩 더 크게 */
    .player-chip { font-size: 14px; padding: 8px 14px; }

    /* 고정 푸터 - 모바일 */
    .toolbar-fixed { padding: 10px 12px; }
    .toolbar-row button { padding: 12px 8px; font-size: 12px; }
    .footer-spacer { height: 120px; }

    .expense-total-value { font-size: 20px; }
    .stat-value { font-size: 22px; }
  }

  @media (max-width: 400px) {
    .session-card tbody td input { width: 120px; }
    .section-title { font-size: 18px; letter-spacing: 1px; }
  }

  /* 모바일에서도 세션은 '가로 행(한 명 = 한 줄)' 표로 유지 (정산 표는 카드형 그대로) */
  @media (max-width: 768px) {
    .session-card .session-body {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .session-card table { display: table; min-width: 100%; }
    .session-card thead { display: table-header-group; }
    .session-card thead th {
      font-size: 14px;
      padding: 10px 5px;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .session-card tbody { display: table-row-group; }
    .session-card tbody tr {
      display: table-row;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      margin: 0;
      box-shadow: none;
    }
    .session-card tbody td {
      display: table-cell;
      vertical-align: middle;
      text-align: right;
      padding: 10px 5px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      white-space: nowrap;
    }
    .session-card tbody td:first-child { text-align: left; }
    .session-card tbody td::before { display: none; } /* data-label 숨김 */
    .session-card .player-name-cell {
      font-family: 'Noto Sans KR', sans-serif !important;
      font-size: 14px !important;
      font-weight: 700 !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
      padding-bottom: 10px !important;
      margin-bottom: 0 !important;
    }
    /* 바인 컬럼 컴팩트 (44px 버튼은 유지) */
    .session-card .buyin-stepper { gap: 6px; }
    .session-card .buyin-display { min-width: 46px; font-size: 16px; }
    /* 남은금액(만단위) 입력칸 표 안 적정 폭 */
    .session-card .remain-input-wrap input {
      width: 60px;
      font-size: 15px;
      padding: 9px 6px;
    }
    .session-card .remain-input-wrap { gap: 4px; }
    .session-card .unit-suffix { font-size: 12px; }
    /* 손익 한글 보조표기는 줄바꿈 방지 위해 숨김 (가로 폭 절약) */
    .session-card tbody td .kor-unit { display: none; }
    /* 빈 상태 행 */
    .session-card tbody tr:has(td.empty) { background: transparent; }
    .session-card tbody td.empty { display: table-cell; text-align: center; white-space: normal; }
  }

  /* 이미지 캡쳐 시 데스크탑 테이블 레이아웃 강제 (모바일 미디어쿼리 무시) */
  .force-desktop-capture .settlement-table { display: table !important; }
  .force-desktop-capture .settlement-table thead { display: table-header-group !important; }
  .force-desktop-capture .settlement-table tbody { display: table-row-group !important; }
  .force-desktop-capture .settlement-table tbody tr {
    display: table-row !important;
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    margin: 0 !important;

  }

  /* === 세션 캡쳐 시 데스크탑 테이블 레이아웃 강제 (모바일 미디어쿼리 무시) === */
  .force-desktop-capture .session-card table { display: table !important; }

  .force-desktop-capture .session-card tbody { display: table-row-group !important; }

    border-top: none !important;
  }
  .force-desktop-capture .session-card tbody td:first-child { text-align: left !important; }
  .force-desktop-capture .session-card tbody td::before { display: none !important; }
  .force-desktop-capture .session-card .player-name-cell {
    font-family: 'Noto Sans KR', sans-serif !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    color: var(--text) !important;

<div class="container">

    </div>

<script>
// ========== State ==========
let state = {
  date: new Date().toISOString().split('T')[0],
  participants: [], // [{id, name}] - 오늘 참가자 (id는 세션 entries 키로 사용)
  playerHistory: [], // [name] - 자동완성용 이전 사용 이름들
  sessions: [], // [{id, name, entries: {playerId: {buyin, remain}}}]
  expenses: []  // [{id, name, amount}] - 비용 통합 (대관료, 식음료비 등)
};

const STORAGE_KEY = 'holdem-ledger-v1';

function uid() { return Math.random().toString(36).slice(2, 10); }
function fmt(n) { return '₩' + Math.round(n).toLocaleString('ko-KR'); }
// 금액을 "만" 단위 한글로 표시 (예: 500000 → "50만", 1230000 → "123만", 0 → "0")
function fmtKor(n) {
  const man = n / 10000;
  if (man === 0) return '0';
  // 만 단위로 떨어지면 "○만", 아니면 소수점 한 자리까지
  if (Number.isInteger(man)) return man.toLocaleString('ko-KR') + '만';
  return (Math.round(man * 10) / 10).toLocaleString('ko-KR') + '만';
}
// 세션 바인/남은 금액 불일치 경고 문구 (차이 금액 + 방향 포함)
function sessionDiffText(totalBuyin, totalRemain) {
  const diff = totalRemain - totalBuyin; // 남은 - 바인
  const dir = diff > 0 ? '남은 금액이 많음' : '남은 금액이 부족';
  return `* 바인과 남은 금액이 ${fmtKor(Math.abs(diff))} 차이나요 (${dir})`;
}

function applyPermissionUI() {

function subscribeRoom() {
  if (!roomId) return;
  roomRef().onSnapshot(snap => {
    if (!snap.exists) return;
    const data = snap.data();
    roomHostUid = data.hostUid || null;
    recomputeRole();
    if (snap.metadata.hasPendingWrites) return; // 내가 방금 쓴 변경은 무시(루프 방지)
    if (data.state) {
      applyingRemote = true;
      state = data.state;
      try { render(); } finally { applyingRemote = false; }
    }
  }, err => console.error('구독 오류', err));
}

async function createRoom() {
  if (!auth.currentUser) {
    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  }
  const code = Math.random().toString(36).slice(2, 8).toUpperCase();
  await db.collection('rooms').doc(code).set({
    hostUid: auth.currentUser.uid,
    hostName: auth.currentUser.displayName || '',
    state: state,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  location.search = '?room=' + code; // 그 방으로 이동 → 링크를 친구에게 공유
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); // 로컬 캐시 유지
  if (roomId && isHost && !applyingRemote) {
    roomRef().set({
      hostUid: roomHostUid || auth.currentUser.uid,
      state: state,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true }).catch(e => console.error('저장 오류', e));
  }
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { 
      const loaded = JSON.parse(raw);
      // 구버전 데이터 마이그레이션 (playerPool + participants[id] → participants[{id,name}])
      if (loaded.playerPool && Array.isArray(loaded.participants) && typeof loaded.participants[0] === 'string') {
        const newParticipants = loaded.participants
          .map(pid => loaded.playerPool.find(p => p.id === pid))
          .filter(Boolean);
        loaded.playerHistory = loaded.playerPool.map(p => p.name);
        loaded.participants = newParticipants;
        delete loaded.playerPool;
      }
      if (!loaded.playerHistory) loaded.playerHistory = [];
      // venue/food → expenses 마이그레이션
      if (!loaded.expenses) {
        loaded.expenses = [];
        if (Array.isArray(loaded.venue)) loaded.expenses.push(...loaded.venue);
        if (Array.isArray(loaded.food)) loaded.expenses.push(...loaded.food);
        delete loaded.venue;
        delete loaded.food;
      }
      state = loaded;
    } catch(e) {}
  }
  if (!state.sessions || state.sessions.length === 0) {
    state.sessions = [{ id: uid(), name: '세션 1', entries: {} }];
  }
}

// ========== Players ==========
function addPlayer() {
  const input = document.getElementById('new-player-name');
  const name = input.value.trim();
  if (!name) return;
  if (state.participants.some(p => p.name === name)) {
    alert('이미 추가된 플레이어예요');
    return;
  }
  const newPlayer = { id: uid(), name };
  state.participants.push(newPlayer);
  // 히스토리에 저장 (자동완성용, 최대 30개)
  if (!state.playerHistory.includes(name)) {
    state.playerHistory.unshift(name);
    if (state.playerHistory.length > 30) state.playerHistory.pop();
  }
  // 모든 세션에 빈 엔트리 추가
  state.sessions.forEach(s => {
    if (!s.entries[newPlayer.id]) s.entries[newPlayer.id] = { buyin: 0, remain: 0 };
  });
  input.value = '';
  save(); render();
}

function removePlayer(id) {
  if (!confirm('이 플레이어를 오늘 참가자에서 제외할까요?')) return;
  state.participants = state.participants.filter(p => p.id !== id);
  state.sessions.forEach(s => { delete s.entries[id]; });
  save(); render();
}

function removeFromHistory(name) {
  state.playerHistory = state.playerHistory.filter(n => n !== name);

}

  };

}

function removeSession(id) {

function updateEntry(sessionId, playerId, field, value) {
  const s = state.sessions.find(s => s.id === sessionId);
  if (!s) return;
  if (!s.entries[playerId]) s.entries[playerId] = { buyin: 0, remain: 0 };
  s.entries[playerId][field] = parseFloat(value) || 0;
  save();
  // 입력 포커스 유지를 위해 전체 재렌더 대신 해당 행 손익 + 세션 검증만 갱신
  updateSessionRowPnl(sessionId, playerId);
  updateSessionValidation(sessionId);
  renderSummary();
}

// 남은 금액을 '만' 단위 입력으로 받아 내부에는 원 단위로 저장 (예: 50 → 500000)
function updateRemainMan(sessionId, playerId, value) {
  const s = state.sessions.find(s => s.id === sessionId);
  if (!s) return;
  if (!s.entries[playerId]) s.entries[playerId] = { buyin: 0, remain: 0 };
  s.entries[playerId].remain = (parseFloat(value) || 0) * 10000;
  save();
  updateSessionRowPnl(sessionId, playerId);
  updateSessionValidation(sessionId);
  renderSummary();
}

const BUYIN_STEP = 100000; // 바인 금액 증감 단위 (10만)

// 바인 금액을 10만 단위로 증감
function stepBuyin(sessionId, playerId, direction) {
  const s = state.sessions.find(s => s.id === sessionId);
  if (!s) return;
  if (!s.entries[playerId]) s.entries[playerId] = { buyin: 0, remain: 0 };
  let next = (s.entries[playerId].buyin || 0) + direction * BUYIN_STEP;
  if (next < 0) next = 0;
  s.entries[playerId].buyin = next;
  save();
  // 한글 표시 갱신
  const card = document.querySelector(`[data-session="${sessionId}"]`);
  if (card) {
    const row = card.querySelector(`[data-row="${playerId}"]`);
    if (row) {
      const display = row.querySelector('.buyin-display');
      if (display) display.textContent = fmtKor(next);
    }
  }
  updateSessionRowPnl(sessionId, playerId);
  updateSessionValidation(sessionId);
  renderSummary();
}

// 특정 행의 손익 셀만 갱신 (포커스 유지)
function updateSessionRowPnl(sessionId, playerId) {
  const s = state.sessions.find(s => s.id === sessionId);
  if (!s) return;
  const entry = s.entries[playerId] || { buyin: 0, remain: 0 };
  const pnl = entry.remain - entry.buyin;
  const cls = pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : 'zero';
  const card = document.querySelector(`[data-session="${sessionId}"]`);
  if (!card) return;
  const row = card.querySelector(`[data-row="${playerId}"]`);
  if (!row) return;
  const pnlCell = row.querySelector('[data-label="손익"]');
  if (pnlCell) {
    pnlCell.className = cls;
    pnlCell.dataset.label = '손익';
    pnlCell.textContent = (pnl > 0 ? '+' : pnl < 0 ? '−' : '') + (pnl !== 0 ? fmtKor(Math.abs(pnl)) : '0');
  }
}

// 세션 검증 상태(빨간 테두리/경고)만 갱신
function updateSessionValidation(sessionId) {
  const s = state.sessions.find(s => s.id === sessionId);
  if (!s) return;
  let totalBuyin = 0, totalRemain = 0;
  state.participants.forEach(p => {
    const entry = s.entries[p.id] || { buyin: 0, remain: 0 };
    totalBuyin += entry.buyin;
    totalRemain += entry.remain;
  });
  const isValid = totalBuyin === totalRemain;
  const hasAnyValue = totalBuyin > 0 || totalRemain > 0;
  const showWarning = state.participants.length > 0 && hasAnyValue && !isValid;
  const showOk = state.participants.length > 0 && hasAnyValue && isValid;
  const card = document.querySelector(`[data-session="${sessionId}"]`);
  if (!card) return;
  card.classList.toggle('invalid', showWarning);
  const headerLeft = card.querySelector('.session-header > div');
  let warningEl = card.querySelector('.session-warning');
  let okEl = card.querySelector('.session-ok');
  // 불일치 경고
  if (showWarning) {
    if (!warningEl && headerLeft) {
      warningEl = document.createElement('span');
      warningEl.className = 'session-warning';
      headerLeft.appendChild(warningEl);
    }
    if (warningEl) warningEl.textContent = sessionDiffText(totalBuyin, totalRemain);
  } else if (warningEl) {
    warningEl.remove();
  }
  // 정산 일치 배지
  if (showOk) {
    if (!okEl && headerLeft) {
      okEl = document.createElement('span');
      okEl.className = 'session-ok';
      okEl.textContent = '✓ 정산 일치';
      headerLeft.appendChild(okEl);
    }
  } else if (okEl) {
    okEl.remove();
  }
}

  input.value = digits === '' ? '' : parseInt(digits, 10).toLocaleString('ko-KR');
}

function renderSummary() {
  // 플레이어별 누적 (모든 세션 합산)
  const playerStats = {};
  state.participants.forEach(p => {
    playerStats[p.id] = { buyin: 0, remain: 0, pnl: 0, actualPnl: 0 };
  });
  state.sessions.forEach(s => {
    state.participants.forEach(p => {
      const e = s.entries[p.id] || { buyin: 0, remain: 0 };
      playerStats[p.id].buyin += e.buyin;
      playerStats[p.id].remain += e.remain;
    });
  });
  state.participants.forEach(p => {
    playerStats[p.id].pnl = playerStats[p.id].remain - playerStats[p.id].buyin;
    // 실제 손익은 50% 적용
    playerStats[p.id].actualPnl = playerStats[p.id].pnl * 0.5;
  });
  
  const totalExpense = state.expenses.reduce((s, e) => s + e.amount, 0);
  
  // 결제자별 환급액 (실제 결제한 금액 — 정확히 보장)
  const paymentRefund = {};
  state.participants.forEach(p => { paymentRefund[p.id] = 0; });
  state.expenses.forEach(e => {
    if (e.payerId && paymentRefund[e.payerId] !== undefined) {
      paymentRefund[e.payerId] += e.amount;
    }
  });
  // 환급 대상 총액 (결제자가 지정된 비용만) / 미지정 비용
  const totalRefund = Object.values(paymentRefund).reduce((s, v) => s + v, 0);
  const unpaidExpense = totalExpense - totalRefund;
  
  // 흑자 플레이어 풀 (실제 손익 기준)
  const profitPlayers = state.participants.filter(p => playerStats[p.id].actualPnl > 0);
  const totalProfit = profitPlayers.reduce((s, p) => s + playerStats[p.id].actualPnl, 0);
  
  // ===== 비용 분담 (합계 정합성 + 결제자 우선) =====
  // 1) 흑자 플레이어들이 "결제자에게 돌려줄 총액(totalRefund)"을 흑자 비율대로 1000원 단위 부담
  // 2) 반올림으로 모자라면 올림 처리(흑자 큰 사람부터 1000원씩 추가)하여 결제자가 손해 안 보게 함
  // 3) 올림으로 더 걷힌 잔액(surplus)은 가장 많이 낸 결제자에게 환급 → 합계 정확히 0
  const expenseShare = {};
  state.participants.forEach(p => { expenseShare[p.id] = 0; });
  let collected = 0;
  let surplus = 0;
  if (totalProfit > 0 && totalRefund > 0) {
    // 1) 비율대로 1000원 단위 반올림
    profitPlayers.forEach(p => {
      const raw = totalRefund * (playerStats[p.id].actualPnl / totalProfit);
      expenseShare[p.id] = Math.round(raw / 1000) * 1000;
    });
    collected = profitPlayers.reduce((sum, p) => sum + expenseShare[p.id], 0);
    // 2) 모자라면 올림: 흑자 비율 큰 사람부터 1000원씩 추가
    const ordered = [...profitPlayers].sort((a, b) =>
      playerStats[b.id].actualPnl - playerStats[a.id].actualPnl
    );
    let i = 0;
    let guard = 0;
    while (collected < totalRefund && guard < 100000) {
      const p = ordered[i % ordered.length];
      expenseShare[p.id] += 1000;
      collected += 1000;
      i++; guard++;
    }
    // 3) 초과분(surplus)은 결제자에게 환급(가장 많이 낸 결제자)
    surplus = collected - totalRefund; // >= 0
    if (surplus > 0) {
      let topPayer = null, max = 0;
      state.participants.forEach(p => {
        if (paymentRefund[p.id] > max) { max = paymentRefund[p.id]; topPayer = p.id; }
      });
      if (topPayer) paymentRefund[topPayer] += surplus;
    }
  }
  
  // 정산 테이블
  const tbody = document.getElementById('settlement-body');
  if (state.participants.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">참가자가 없어요</td></tr>';
  } else {
    tbody.innerHTML = state.participants.map((p, idx) => {
      const s = playerStats[p.id];
      const share = expenseShare[p.id];
      const refund = paymentRefund[p.id];
      const final = s.actualPnl - share + refund;
      const cls = final > 0 ? 'profit' : final < 0 ? 'loss' : 'zero';
      const pnlCls = s.actualPnl > 0 ? 'profit' : s.actualPnl < 0 ? 'loss' : 'zero';
      return `
        <tr class="${idx % 2 === 0 ? 'settle-even' : 'settle-odd'}">
          <td data-label="플레이어" class="player-name-cell">${escapeHtml(p.name)}</td>
          <td data-label="바인 합계">${fmt(s.buyin)}</td>
          <td data-label="남은 금액">${fmt(s.remain)}</td>
          <td data-label="실제 손익" class="${pnlCls}">${s.actualPnl > 0 ? '+' : ''}${fmt(s.actualPnl)}</td>
          <td data-label="비용 부담">${share > 0 ? '−' + fmt(share) : '—'}</td>
          <td data-label="결제 환급">${refund > 0 ? '+' + fmt(refund) : '—'}</td>
          <td data-label="최종 정산" class="final-cell ${cls}">${final > 0 ? '+' : ''}${fmt(final)}<span class="kor-unit">${final !== 0 ? (final > 0 ? '+' : '−') + fmtKor(Math.abs(final)) : ''}</span></td>
        </tr>
      `;
    }).join('');
  }
  
  // 분담 방식 안내
  const note = document.getElementById('settlement-note');
  let noteHtml = '';
  if (totalRefund > 0 && totalProfit > 0) {
    const detail = profitPlayers
      .filter(p => expenseShare[p.id] > 0)
      .map(p => {
        const ratio = (playerStats[p.id].actualPnl / totalProfit * 100).toFixed(1);
        return `${escapeHtml(p.name)}: ${ratio}% (${fmt(expenseShare[p.id])})`;
      }).join(' · ');
    noteHtml = `<strong style="color: var(--gold);">비용 분담 방식</strong><br>결제자에게 돌려줄 비용 ${fmt(totalRefund)}원을 흑자 플레이어들이 흑자 비율대로 천 원 단위로 부담합니다. 모자라는 경우 올림 처리해 결제자가 손해 보지 않도록 했어요.<br>${detail}`;
    
    // 결제자 환급 안내
    const refunders = state.participants.filter(p => paymentRefund[p.id] > 0);
    if (refunders.length > 0) {
      const refundDetail = refunders.map(p => `${escapeHtml(p.name)}: +${fmt(paymentRefund[p.id])}`).join(' · ');
      noteHtml += `<br><br><strong style="color: var(--gold);">결제 환급</strong><br>${refundDetail}`;
    }
    if (surplus > 0) {
      noteHtml += `<br><span style="color: var(--text-dim);">※ 올림으로 더 걷힌 ${fmt(surplus)}원은 결제자 환급에 포함했어요 (결제자에게 유리하게 처리).</span>`;
    }
    if (unpaidExpense > 0) {
      noteHtml += `<br><br><span style="color: var(--red);">⚠ 결제자 미지정 비용 ${fmt(unpaidExpense)}원은 정산에서 제외했어요. 결제자를 지정하면 자동으로 분담·환급에 반영됩니다.</span>`;
    }
  } else if (totalExpense > 0 && totalProfit <= 0) {
    noteHtml = `<strong style="color: var(--gold);">알림</strong> · 흑자 플레이어가 없어 비용 분담이 계산되지 않았어요. 모두 적자면 결제 비용은 별도 협의가 필요해요.`;
    if (unpaidExpense > 0) {
      noteHtml += `<br><span style="color: var(--red);">⚠ 결제자 미지정 비용 ${fmt(unpaidExpense)}원이 있어요.</span>`;
    }
  } else if (totalExpense > 0 && totalRefund === 0) {
    noteHtml = `<span style="color: var(--red);">⚠ 모든 비용에 결제자가 지정되지 않았어요. 결제자를 지정하면 자동으로 분담·환급이 계산돼요.</span>`;
  } else {
    noteHtml = `비용을 입력하고 결제자를 지정하면 흑자 플레이어들의 비용 분담이 자동 계산돼요.`;
  }
  note.innerHTML = noteHtml;
}

function render() {
  document.getElementById('game-date').value = state.date;
  // 정산 섹션 상단 날짜 표시
  const dateDisplay = document.getElementById('settlement-date-display');
  if (state.date) {
    const d = new Date(state.date);
    const formatted = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    dateDisplay.textContent = `▸ ${formatted}`;
  } else {
    dateDisplay.textContent = '';
  }
  renderParticipantsDisplay();
  renderPlayerHistory();
  renderSessions();
  renderExpenses();
  renderSummary();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ========== 공통 캡쳐 → 공유/다운로드 헬퍼 ==========
async function captureAndShare(element, filename, shareTitle, shareText) {
  const blob = await new Promise(resolve =>
    element.__pendingCanvas.toBlob(resolve, 'image/png')
  );
  const file = new File([blob], filename, { type: 'image/png' });

  // Web Share API 시도 (모바일에서 OS 공유 시트 → 카톡 선택 가능)
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: shareTitle, text: shareText });
      return 'shared';
    } catch (err) {
      if (err.name === 'AbortError') return 'aborted';
      console.warn('Share API 실패, 다운로드로 전환:', err);
    }
  }

  // Fallback: 다운로드
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  return navigator.canShare ? 'downloaded' : 'downloaded-notice';
}

// ========== 세션별 이미지 공유 ==========
async function shareSession(sessionId) {
  const session = state.sessions.find(s => s.id === sessionId);
  if (!session) return;
  if (state.participants.length === 0) {
    alert('참가자가 없어요. 공유할 내용이 없습니다.');
    return;
  }

  const card = document.querySelector(`[data-session="${sessionId}"]`);
  if (!card) return;
  const btn = card.querySelector('.session-share-btn');
  const originalBtnHtml = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '⏳'; btn.disabled = true; }

  // 접혀있으면 임시로 펼치기
  const wasCollapsed = card.classList.contains('collapsed');
  if (wasCollapsed) card.classList.remove('collapsed');

  // 데스크탑 폭 강제 없이, 폰 화면 그대로의 콤팩트한 폭으로 캡쳐
  const CAPTURE_WIDTH = 390;
  const originalCssText = card.style.cssText;
  const originalBodyOverflow = document.body.style.overflow;
  const bodyEl = card.querySelector('.session-body');
  const prevBodyOverflowX = bodyEl ? bodyEl.style.overflowX : '';

  // 화면 밖에서 렌더 (force-desktop-capture 미적용 → 모바일 레이아웃 유지)
  card.style.width = CAPTURE_WIDTH + 'px';
  card.style.maxWidth = 'none';
  card.style.position = 'fixed';
  card.style.left = '-9999px';
  card.style.top = '0';
  card.style.zIndex = '-1';
  document.body.style.overflow = 'hidden';
  if (bodyEl) bodyEl.style.overflowX = 'visible'; // 표가 잘리지 않도록
  card.classList.add('session-capturing');

  const restore = () => {
    card.style.cssText = originalCssText;
    document.body.style.overflow = originalBodyOverflow;
    if (bodyEl) bodyEl.style.overflowX = prevBodyOverflowX;
    card.classList.remove('session-capturing');
    if (wasCollapsed) card.classList.add('collapsed');
  };

  try {
    await new Promise(r => setTimeout(r, 50));

    // 내용이 더 넓으면 그만큼만 확장 (가로로 길어지지 않게)
    const w = Math.max(CAPTURE_WIDTH, card.scrollWidth);
    card.style.width = w + 'px';

    const canvas = await html2canvas(card, {
      backgroundColor: '#ffffff',
      scale: 2,
      width: w,
      windowWidth: CAPTURE_WIDTH,
      logging: false,
      useCORS: true
    });

    restore();

    card.__pendingCanvas = canvas;
    const safeName = (session.name || '세션').replace(/[\\/:*?"<>|]/g, '_');
    const filename = `홀덤_${state.date || 'untitled'}_${safeName}.png`;
    const result = await captureAndShare(
      card,
      filename,
      `홀덤 정산 - ${session.name}`,
      `홀덤 정산 결과 · ${session.name} (${state.date || ''})`
    );
    delete card.__pendingCanvas;

    if (result === 'downloaded-notice') {
      setTimeout(() => {
        alert('이미지가 다운로드 되었어요!\n카톡 채팅창에 끌어다 놓으시면 공유 가능합니다.');
      }, 300);
    }
  } catch (err) {
    restore();
    alert('이미지 생성 실패: ' + err.message);
  } finally {
    if (btn) { btn.innerHTML = originalBtnHtml; btn.disabled = false; }
  }
}

// ========== Image Share (최종 정산 전체) ==========
async function shareImage() {
  if (state.participants.length === 0) {
    alert('참가자가 없어요. 정산할 내용이 없습니다.');
    return;
  }
  
  const section = document.getElementById('settlement-section');
  const btn = event.target;
  const originalText = btn.textContent;
  btn.textContent = '⏳ 생성 중...';
  btn.disabled = true;
  
  // 데스크탑 너비로 강제 캡쳐를 위한 임시 스타일 적용
  const DESKTOP_WIDTH = 1060; // 컨테이너 max-width 1100 - padding 고려
  const originalCssText = section.style.cssText;
  const originalBodyOverflow = document.body.style.overflow;
  
  // 캡쳐용 임시 스타일
  section.style.width = DESKTOP_WIDTH + 'px';
  section.style.maxWidth = 'none';
  section.style.position = 'fixed';
  section.style.left = '-9999px';
  section.style.top = '0';
  section.style.zIndex = '-1';
  document.body.style.overflow = 'hidden';
  document.body.classList.add('force-desktop-capture');
  
  try {
    // DOM 렌더링 반영 대기
    await new Promise(resolve => setTimeout(resolve, 50));
    
    // 1. 정산 섹션을 캔버스로 캡쳐 (데스크탑 너비)
    const canvas = await html2canvas(section, {
      backgroundColor: '#ffffff',
      scale: 2,
      width: DESKTOP_WIDTH,
      windowWidth: DESKTOP_WIDTH,
      logging: false,
      useCORS: true
    });
    
    // 원래 스타일 복원
    section.style.cssText = originalCssText;
    document.body.style.overflow = originalBodyOverflow;
    document.body.classList.remove('force-desktop-capture');
    
    // 2. Blob 생성
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const filename = `홀덤정산_${state.date || 'untitled'}.png`;
    const file = new File([blob], filename, { type: 'image/png' });
    
    // 3. Web Share API 시도 (모바일에서 OS 공유 시트 → 카톡 선택 가능)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: '홀덤 정산 결과',
          text: `홀덤 정산 결과 (${state.date || ''})`
        });
        return;
      } catch (err) {
        if (err.name === 'AbortError') return;
        console.warn('Share API 실패, 다운로드로 전환:', err);
      }
    }
    
    // 4. Fallback: 다운로드
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    
    if (!navigator.canShare) {
      setTimeout(() => {
        alert('이미지가 다운로드 되었어요!\n카톡 채팅창에 끌어다 놓으시면 공유 가능합니다.');
      }, 300);
    }
  } catch(err) {
    // 에러 발생 시에도 스타일 복원
    section.style.cssText = originalCssText;
    document.body.style.overflow = originalBodyOverflow;
    document.body.classList.remove('force-desktop-capture');
    alert('이미지 생성 실패: ' + err.message);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

// ========== Import/Export ==========
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `holdem-${state.date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions) throw new Error('형식 오류');
      // 구버전 호환 마이그레이션
      if (data.playerPool && Array.isArray(data.participants) && typeof data.participants[0] === 'string') {
        const newParticipants = data.participants
          .map(pid => data.playerPool.find(p => p.id === pid))
          .filter(Boolean);
        data.playerHistory = data.playerPool.map(p => p.name);
        data.participants = newParticipants;
        delete data.playerPool;
      }
      if (!data.participants) data.participants = [];
      if (!data.playerHistory) data.playerHistory = [];
      // venue/food → expenses 마이그레이션
      if (!data.expenses) {
        data.expenses = [];
        if (Array.isArray(data.venue)) data.expenses.push(...data.venue);
        if (Array.isArray(data.food)) data.expenses.push(...data.food);
        delete data.venue;
        delete data.food;
      }
      state = data;
      save(); render();
      alert('불러왔어요!');
    } catch(err) {
      alert('파일을 읽을 수 없어요: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAll() {
  document.getElementById('reset-modal').classList.add('show');
}

function closeResetModal() {
  document.getElementById('reset-modal').classList.remove('show');
}

function confirmReset() {
  localStorage.removeItem(STORAGE_KEY);
  state = {
    date: new Date().toISOString().split('T')[0],
    participants: [],
    playerHistory: [],
    sessions: [{ id: uid(), name: '세션 1', entries: {} }],
    expenses: []
  };
  save(); render();
  closeResetModal();
}
